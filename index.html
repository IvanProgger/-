<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Студенческий опросник</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>📊 Студенческий опросник</h1>
            <p class="subtitle" id="headerSubtitle">Создай опрос за минуту</p>
        </header>

        <main>
            <!-- КОНСТРУКТОР (по умолчанию скрыт) -->
            <div class="constructor" id="constructor" style="display: none;">
                <h2>Создание опроса</h2>
                
                <div class="form-group">
                    <label for="pollTitle">Название опроса</label>
                    <input type="text" id="pollTitle" class="big-input" placeholder="Например: Куда пойдем в воскресенье?" value="Опрос группы">
                </div>

                <div class="form-group">
                    <label for="questionText">Вопрос</label>
                    <input type="text" id="questionText" class="big-input" placeholder="Текст вопроса" value="Куда идем?">
                </div>

                <div class="options-container" id="optionsContainer">
                    <label>Варианты ответа</label>
                    <div class="option-item">
                        <input type="text" class="big-input option-input" placeholder="Вариант 1" value="Кино">
                    </div>
                    <div class="option-item">
                        <input type="text" class="big-input option-input" placeholder="Вариант 2" value="Парк">
                    </div>
                </div>

                <div class="buttons-row">
                    <button class="btn btn-secondary" id="addOptionBtn">➕ Добавить вариант</button>
                    <button class="btn btn-success" id="createPollBtn">✅ Создать опрос</button>
                </div>
            </div>

            <!-- РЕЗУЛЬТАТ (ссылки на опрос) -->
            <div class="result" id="result" style="display: none;">
                <h2>🎉 Опрос готов!</h2>
                
                <div class="link-block">
                    <p class="link-label">🔗 Ссылка для голосования (кинь друзьям):</p>
                    <div class="link-copy">
                        <span class="link-url" id="voteLink">https://studentpoll.ru/vote/123</span>
                        <button class="btn btn-small copy-btn" id="copyVoteBtn">📋 Копировать</button>
                    </div>
                </div>

                <div class="link-block">
                    <p class="link-label">🔒 Ссылка для результатов (только для тебя):</p>
                    <div class="link-copy">
                        <span class="link-url" id="resultLink">https://studentpoll.ru/results/123</span>
                        <button class="btn btn-small copy-btn" id="copyResultBtn">📋 Копировать</button>
                    </div>
                </div>

                <div class="buttons-row">
                    <button class="btn btn-primary" id="viewPollBtn">👀 Посмотреть опрос</button>
                    <button class="btn btn-secondary" id="createAnotherBtn">🔄 Создать новый</button>
                </div>
            </div>

            <!-- ГОЛОСОВАНИЕ (то, что нужно другу) -->
            <div class="poll-view" id="pollView" style="display: none;">
                <h2 id="viewPollTitle">Опрос группы</h2>
                <p class="poll-question" id="viewPollQuestion">Куда идем?</p>
                
                <div class="options-list" id="optionsList"></div>

                <div class="buttons-row">
                    <button class="btn btn-primary btn-large" id="voteBtn">🗳️ Проголосовать</button>
                    <button class="btn btn-secondary" id="backFromPollBtn">← Назад</button>
                </div>
            </div>

            <!-- РЕЗУЛЬТАТЫ (для того, кто создал) -->
            <div class="results-view" id="resultsView" style="display: none;">
                <h2 id="resultsTitle">Результаты опроса</h2>
                
                <div class="stats-container" id="statsContainer"></div>
                <div class="progress-container" id="progressContainer"></div>

                <div class="buttons-row">
                    <button class="btn btn-secondary" id="backFromResultsBtn">← К опросам</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
